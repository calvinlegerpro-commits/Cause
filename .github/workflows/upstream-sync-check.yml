name: "Vérification upstream Handy"

on:
  schedule:
    - cron: "0 9 * * 1" # Tous les lundis à 9h UTC
  workflow_dispatch: # Déclenchement manuel possible

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Vérifier les nouveaux commits upstream
        id: check
        run: |
          git remote add upstream https://github.com/cjpais/Handy.git
          git fetch upstream main --quiet

          # Commits dans upstream mais pas dans notre fork
          NEW_COMMITS=$(git log HEAD..upstream/main --oneline)

          if [ -z "$NEW_COMMITS" ]; then
            echo "Aucun nouveau commit upstream."
            echo "has_updates=false" >> $GITHUB_OUTPUT
          else
            COUNT=$(echo "$NEW_COMMITS" | wc -l | tr -d ' ')
            echo "has_updates=true" >> $GITHUB_OUTPUT
            echo "count=$COUNT" >> $GITHUB_OUTPUT

            # Sauvegarder les commits pour l'issue (max 30)
            COMMITS_LIST=$(echo "$NEW_COMMITS" | head -30)
            echo "commits<<EOF" >> $GITHUB_OUTPUT
            echo "$COMMITS_LIST" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Vérifier si une issue est déjà ouverte
        if: steps.check.outputs.has_updates == 'true'
        id: existing_issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OPEN=$(gh issue list --label "upstream-sync" --state open --json number --jq length)
          echo "open_count=$OPEN" >> $GITHUB_OUTPUT

      - name: Créer une issue si pas déjà ouverte
        if: steps.check.outputs.has_updates == 'true' && steps.existing_issue.outputs.open_count == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMITS: ${{ steps.check.outputs.commits }}
          COUNT: ${{ steps.check.outputs.count }}
        run: |
          BODY="## Nouveaux commits sur [cjpais/Handy](https://github.com/cjpais/Handy)

          \`\`\`
          ${COMMITS}
          \`\`\`

          ## Que faire ?

          1. Lire les commits ci-dessus et évaluer si la mise à jour vaut le coup
          2. Si oui, dans ton terminal :
          \`\`\`bash
          git fetch upstream
          git merge upstream/main
          # Résoudre les conflits si besoin
          git push origin main
          \`\`\`
          3. Fermer cette issue une fois la synchro effectuée

          ---
          _Vérification automatique — upstream : \`cjpais/Handy\`_"

          gh issue create \
            --title "⬆️ Mise à jour upstream disponible (${COUNT} commits)" \
            --label "upstream-sync" \
            --body "$BODY"
